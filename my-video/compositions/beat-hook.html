    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '#beat-hook';

        tl.to(root + " .bh-blackout", { opacity: 0, duration: 0.5, ease: "power2.out" }, 0);

        // App layout : sidebar slides in left, cards slide in
        tl.from(root + " .bh-sb-logo", { x: -30, opacity: 0, duration: 0.45, ease: "power3.out" }, 0.1);
        tl.from(root + " .bh-sb-item", {
          x: -20,
          opacity: 0,
          duration: 0.3,
          stagger: 0.04,
          ease: "power2.out",
        }, 0.25);

        tl.from(root + " .bh-page-title", { y: -15, opacity: 0, duration: 0.4, ease: "power3.out" }, 0.3);
        tl.from(root + " .bh-view-toggle", { x: 15, opacity: 0, duration: 0.4, ease: "power3.out" }, 0.4);

        tl.from(root + " .bh-card", {
          y: 30,
          opacity: 0,
          duration: 0.45,
          stagger: 0.08,
          ease: "power3.out",
        }, 0.55);

        // Highlights stagger sur les modules (un par un, rapide)
        tl.fromTo(root + " .bh-sb-item:not(.bh-sb-item--active)",
          { color: "rgba(255, 255, 255, 0.6)" },
          {
            color: function (i, target) {
              return getComputedStyle(target).getPropertyValue("--accent") || "#fff";
            },
            duration: 0.2,
            stagger: 0.08,
            ease: "power2.out",
          },
          1.4);

        // Dim background + hero overlay
        tl.to(root + " .bh-dim", {
          opacity: 1,
          duration: 0.8,
          ease: "power2.inOut",
        }, 2.6);

        tl.from(root + " .bh-hero-logo", {
          scale: 0.7,
          opacity: 0,
          filter: "blur(10px)",
          duration: 0.7,
          ease: "back.out(1.3)",
        }, 2.9);
        tl.to(root + " .bh-hero-glow", {
          opacity: 1,
          duration: 0.45,
          ease: "power2.out",
        }, 3.3);
        tl.from(root + " .bh-hero-wordmark", {
          y: 30,
          opacity: 0,
          duration: 0.5,
          ease: "expo.out",
        }, 3.4);
        tl.from(root + " .bh-hero-tagline", {
          y: 15,
          opacity: 0,
          duration: 0.5,
          ease: "power3.out",
        }, 3.6);

                tl.to({}, { duration: 5 });
        window.__timelines["beat-hook"] = tl;
