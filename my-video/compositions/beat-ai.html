    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = '#beat-ai';

        tl.to(root + " .ba-blackout", { opacity: 0, duration: 0.45, ease: "power2.out" }, 0);

        tl.from(root + " .ba-sidebar", { x: -40, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.15);
        tl.from(root + " .ba-dam-nav", { x: -30, opacity: 0, duration: 0.5, ease: "power3.out" }, 0.3);
        tl.from(root + " .ba-dam-menu li", { x: -10, opacity: 0, duration: 0.25, stagger: 0.04, ease: "power2.out" }, 0.45);

        // Panel Nano Banana
        tl.from(root + " .ba-dam-panel", { y: 30, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.6);
        tl.from(root + " .ba-dam-panel .ba-field, " + root + " .ba-dam-panel .ba-panel-head, " + root + " .ba-dam-panel .ba-cta", {
          y: 15,
          opacity: 0,
          duration: 0.35,
          stagger: 0.08,
          ease: "power2.out",
        }, 0.85);

        // Typewriter prompt
        const prompt = document.querySelector(root + " .ba-prompt-text");
        const targetText = "Perceuse à percussion Milwaukee M18 FPD3 sur fond studio dark, lumière dramatique, ratio carré.";
        const tw = { p: 0 };
        if (prompt) prompt.textContent = "";
        tl.to(tw, {
          p: 1,
          duration: 2.4,
          ease: "none",
          onUpdate: function () {
            if (!prompt) return;
            const n = Math.floor(targetText.length * tw.p);
            prompt.textContent = targetText.slice(0, n);
          },
        }, 1.2);

        // Canvas area
        tl.from(root + " .ba-canvas-area", { x: 40, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.7);
        tl.from(root + " .ba-canvas-head", { y: 15, opacity: 0, duration: 0.4, ease: "power2.out" }, 0.9);

        // Image reveal (drill)
        tl.fromTo(root + " .ba-tile-veil",
          { clipPath: "inset(0 0 0 0)" },
          { clipPath: "inset(0 0 100% 0)", duration: 1.2, ease: "power2.inOut" },
          3.0);
        tl.from(root + " .ba-drill", {
          scale: 1.1,
          opacity: 0,
          duration: 0.9,
          ease: "power3.out",
        }, 3.2);

        // Overlay eyebrow + title
        tl.from(root + " .ba-overlay", { y: 30, opacity: 0, duration: 0.55, ease: "expo.out" }, 4.0);
        tl.from(root + " .ba-eyebrow", { x: 20, opacity: 0, duration: 0.4, ease: "power2.out" }, 4.15);
        tl.from(root + " .ba-title", { y: 15, opacity: 0, duration: 0.45, ease: "power3.out" }, 4.25);

                tl.to({}, { duration: 10 });
        window.__timelines["beat-ai"] = tl;
