<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>PIM Capture</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 400px;
      margin: 0;
      background: #0f0f0f;
      color: rgba(255,255,255,0.9);
      font: 13px -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    header {
      padding: 10px 12px;
      background: linear-gradient(to right, rgba(99,102,241,0.12), rgba(236,72,153,0.08));
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    header h1 { margin: 0; font-size: 13px; font-weight: 600; }
    header .subtitle { font-size: 10px; color: rgba(255,255,255,0.4); }
    section { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    section h2 { margin: 0 0 6px; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.05em; }
    input[type=text] {
      width: 100%; padding: 6px 8px; font: inherit; font-size: 11px;
      background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
      color: inherit;
    }
    button {
      font: inherit; font-size: 11px; cursor: pointer;
      padding: 6px 10px; border-radius: 4px; border: 1px solid;
      background: transparent; color: inherit;
      display: inline-flex; align-items: center; gap: 4px;
    }
    button.primary { background: rgba(99,102,241,0.2); color: #c7d2fe; border-color: rgba(129,140,248,0.3); }
    button.primary:hover { background: rgba(99,102,241,0.3); }
    button.success { background: rgba(16,185,129,0.2); color: #a7f3d0; border-color: rgba(52,211,153,0.3); }
    button.danger { background: rgba(239,68,68,0.15); color: #fca5a5; border-color: rgba(239,68,68,0.3); }
    button.ghost { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.1); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .row { display: flex; gap: 6px; align-items: center; }
    .field-row {
      display: flex; gap: 6px; align-items: center; padding: 5px 6px;
      background: rgba(255,255,255,0.03); border-radius: 4px; margin-bottom: 4px;
      font-size: 11px;
    }
    .field-row .name { color: #c7d2fe; font-weight: 600; min-width: 80px; }
    .field-row code { flex: 1; color: rgba(255,255,255,0.5); font-family: ui-monospace, monospace; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px; border-radius: 10px; font-size: 10px;
    }
    .status-on { background: rgba(16,185,129,0.15); color: #6ee7b7; }
    .status-off { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); }
    .capture-modal {
      padding: 10px 12px; background: #141414; border-top: 1px solid rgba(255,255,255,0.08);
    }
    .selector-option {
      padding: 5px 6px; margin-bottom: 3px; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px; font-family: ui-monospace, monospace; font-size: 10px;
      cursor: pointer; background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.7);
    }
    .selector-option:hover { background: rgba(255,255,255,0.05); }
    .selector-option.selected { background: rgba(99,102,241,0.15); border-color: rgba(129,140,248,0.5); color: #c7d2fe; }
    .field-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin: 6px 0; }
    .field-buttons button { width: 100%; font-size: 10px; padding: 4px 6px; }
    .empty { padding: 20px 12px; text-align: center; color: rgba(255,255,255,0.35); font-size: 11px; }
    label.checkbox { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>PIM Capture</h1>
      <div class="subtitle" id="host">—</div>
    </div>
    <span id="status" class="status-pill status-off">● Inactif</span>
  </header>

  <section>
    <h2>Template</h2>
    <input type="text" id="tpl-name" placeholder="Nom du template (ex: Nicoll fiche produit)" />
    <div style="height: 6px"></div>
    <input type="text" id="tpl-domain" placeholder="Domaine (auto)" />
    <div class="row" style="margin-top: 8px">
      <button id="toggle-capture" class="primary" style="flex: 1">▶ Activer la capture</button>
      <button id="clear-fields" class="ghost" title="Effacer tous les champs capturés">✕</button>
    </div>
  </section>

  <section id="captured-section">
    <h2>Champs capturés (<span id="field-count">0</span>)</h2>
    <div id="fields-list"></div>
  </section>

  <div id="capture-modal" class="capture-modal" style="display:none">
    <h2 style="margin-bottom: 6px">Élément capturé</h2>
    <div id="capture-info" style="font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 6px"></div>
    <div id="selectors-list"></div>
    <label class="checkbox" style="margin-top: 6px">
      <input type="checkbox" id="multiple-check" /> Liste (images, specs, variantes…)
    </label>
    <div class="field-buttons" id="field-buttons"></div>
    <div class="row">
      <input type="text" id="custom-field" placeholder="Nom de champ custom" />
      <button id="assign-custom" class="success">Assigner</button>
      <button id="cancel-capture" class="ghost">✕</button>
    </div>
  </div>

  <section>
    <div class="row">
      <button id="export-json" class="success" style="flex: 1">⬇ Exporter JSON</button>
      <button id="import-json" class="ghost">⬆ Importer</button>
      <input type="file" id="file-input" accept="application/json" style="display:none" />
    </div>
    <div style="margin-top: 8px; font-size: 10px; color: rgba(255,255,255,0.35); line-height: 1.4">
      Importe ensuite ce JSON dans ton PIM : <b>Dashboard → Templates scraping → Nouveau → Importer</b>.
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
