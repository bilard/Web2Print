<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1080px;
        background: #0a0a0a; overflow: hidden;
        font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      [data-composition-id="design-reveal-square"] {
        position: relative;
        width: 1080px; height: 1080px;
        background: #0a0a0a;
        overflow: hidden;
      }

      .stage {
        position: absolute;
        inset: 0;
        display: flex; align-items: center; justify-content: center;
        transform-origin: 50% 50%;
        will-change: transform, opacity;
      }
      .svg-host { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
      .svg-host > svg {
        width: 100%; height: 100%;
        filter: drop-shadow(0 24px 50px rgba(0,0,0,0.5));
      }

      .caption {
        position: absolute;
        left: 64px; right: 64px; bottom: 70px;
        color: #fff;
        font-size: 68px; font-weight: 900;
        letter-spacing: -0.03em; line-height: 0.98;
        text-shadow: 0 8px 22px rgba(0,0,0,0.9);
        z-index: 10;
      }
      .caption[hidden] { display: none; }
      .caption .word { display: inline-block; padding-right: 0.22em; will-change: transform, opacity; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="design-reveal-square"
      data-start="0"
      data-duration="10"
      data-width="1080"
      data-height="1080"
      data-composition-variables='[
        {"id":"svg","type":"string","label":"SVG inline","default":""},
        {"id":"caption","type":"string","label":"Caption","default":""},
        {"id":"prompt","type":"string","label":"Prompt de formatage","default":""},
        {"id":"styleConfig","type":"object","label":"Style config (pace/intensity/ease/palette)","default":null}
      ]'
    >
      <div class="stage" id="stage">
        <div class="svg-host" id="svg-host"></div>
      </div>

      <div class="caption" id="caption" hidden></div>
    </div>

    <script>
      (function () {
        const hf = window.__hyperframes;
        const vars = (hf && typeof hf.getVariables === 'function' ? hf.getVariables() : {}) || {};

        // ── Style config (Gemini-derived) ───────────────────────────────────
        const sc = vars.styleConfig || {};
        const palette = sc.palette || {};
        const BG = palette.bg || '#0a0a0a';
        const ACCENT = palette.accent || '#ffffff';
        const PACE_MULT = { slow: 1.3, normal: 1.0, fast: 0.7 }[sc.pace] ?? 1.0;
        const INT_SCALE = { subtle: 0.5, normal: 1.0, punchy: 1.8 }[sc.intensity] ?? 1.0;
        const EASE_IN   = { soft: 'power2.out', classic: 'expo.out',  snappy: 'back.out(1.4)' }[sc.ease] ?? 'expo.out';
        const EASE_OUT  = { soft: 'power2.inOut', classic: 'power2.in', snappy: 'back.in(1.2)' }[sc.ease] ?? 'power2.in';
        const dur = (d) => d * PACE_MULT;
        const amp = (v) => v * INT_SCALE;

        document.body.style.background = BG;
        const compEl = document.querySelector('[data-composition-id="design-reveal-square"]');
        if (compEl) compEl.style.background = BG;
        document.documentElement.style.setProperty('--accent', ACCENT);

        const host = document.getElementById('svg-host');
        if (vars.svg) host.innerHTML = String(vars.svg);

        const capEl = document.getElementById('caption');
        if (vars.caption) {
          const words = String(vars.caption).split(/\s+/).filter(Boolean);
          capEl.innerHTML = words.map(w => '<span class="word">' + w + '</span>').join('');
          capEl.style.color = ACCENT;
          capEl.hidden = false;
        }

        const svgEl = host.querySelector('svg');
        const shapes = svgEl ? Array.from(svgEl.querySelectorAll('path, rect, circle, polygon, polyline, ellipse, line')) : [];
        const images = svgEl ? Array.from(svgEl.querySelectorAll('image')) : [];
        const texts  = svgEl ? Array.from(svgEl.querySelectorAll('text'))  : [];

        // Détecte un SVG "raster-only" : aucune forme, aucun texte, juste 1 ou 2 images
        // (cas typique d'une page importée depuis un PDF/DAM en bitmap unique).
        // Sans ce fallback, l'animation se réduit à un fade-in d'un seul élément +
        // micro-zoom imperceptible → l'utilisateur voit "image fixe".
        const RASTER_ONLY = shapes.length === 0 && texts.length === 0 && images.length >= 1 && images.length <= 2;

        const tl = gsap.timeline({ paused: true });

        // ===== ENTRÉE DU STAGE : slide horizontal depuis la gauche =====
        const slideAmp = amp(100);
        tl.from('#stage', { x: -slideAmp, opacity: 0, duration: dur(0.9), ease: 'expo.out' }, 0);

        // ===== OSCILLATION SÉQUENTIELLE (pas de yoyo — seek-safe) =====
        // Le #stage glisse droite/gauche en plusieurs étapes sur les 10s totales
        tl.to('#stage', { x: slideAmp * 0.4, duration: dur(2.2), ease: 'sine.inOut' }, dur(1.5));
        tl.to('#stage', { x: -slideAmp * 0.4, duration: dur(2.2), ease: 'sine.inOut' }, dur(3.7));
        tl.to('#stage', { x: slideAmp * 0.3, duration: dur(2.0), ease: 'sine.inOut' }, dur(5.9));
        tl.to('#stage', { x: 0, duration: dur(1.5), ease: 'sine.inOut' }, dur(7.9));

        // ===== HUE-ROTATE séquentiel (pas yoyo) =====
        tl.to('#stage', { filter: 'hue-rotate(60deg)',  duration: dur(2.0), ease: 'sine.inOut' }, dur(1.0));
        tl.to('#stage', { filter: 'hue-rotate(-30deg)', duration: dur(2.0), ease: 'sine.inOut' }, dur(3.5));
        tl.to('#stage', { filter: 'hue-rotate(45deg)',  duration: dur(2.0), ease: 'sine.inOut' }, dur(5.8));
        tl.to('#stage', { filter: 'hue-rotate(0deg)',   duration: dur(1.5), ease: 'sine.inOut' }, dur(8.0));

        // ===== SCALE pulse séquentiel =====
        tl.to('#stage', { scale: 1.08, duration: dur(1.5), ease: 'sine.inOut' }, dur(1.5));
        tl.to('#stage', { scale: 0.98, duration: dur(1.5), ease: 'sine.inOut' }, dur(3.5));
        tl.to('#stage', { scale: 1.05, duration: dur(1.5), ease: 'sine.inOut' }, dur(5.5));
        tl.to('#stage', { scale: 1.0,  duration: dur(1.5), ease: 'sine.inOut' }, dur(7.5));

        if (RASTER_ONLY) {
          tl.set(images, { opacity: 0, transformOrigin: '50% 50%' }, 0);
          tl.to(images, { opacity: 1, duration: dur(0.9), ease: EASE_IN }, dur(0.2));
          tl.fromTo(images, {
            x: -amp(60), y: amp(30), scale: 1.0,
          }, {
            x: amp(60), y: -amp(30), scale: 1 + amp(0.20),
            duration: dur(8.5), ease: 'sine.inOut',
          }, dur(0.6));
        } else {
          const allSvgEls = [...shapes, ...images, ...texts];
          if (allSvgEls.length > 0) tl.set(allSvgEls, { opacity: 0 }, 0);

          if (shapes.length > 0) {
            shapes.forEach((shape, i) => {
              const fromX = i % 2 === 0 ? -amp(180) : amp(180);
              tl.fromTo(shape, { x: fromX, opacity: 0 }, {
                x: 0, opacity: 1, duration: dur(0.7), ease: 'power3.out',
              }, dur(0.4 + i * Math.min(0.03, 1.2 / shapes.length) * PACE_MULT));
            });
          }
          if (images.length > 0) {
            images.forEach((img, i) => {
              const fromX = i % 2 === 0 ? amp(140) : -amp(140);
              tl.fromTo(img, { x: fromX, opacity: 0 }, {
                x: 0, opacity: 1, duration: dur(0.8), ease: 'power3.out',
              }, dur(1.4 + i * Math.min(0.10, 1.5 / images.length) * PACE_MULT));
            });
          }
          if (texts.length > 0) {
            texts.forEach((txt, i) => {
              const fromX = i % 2 === 0 ? -amp(120) : amp(120);
              tl.fromTo(txt, { x: fromX, opacity: 0 }, {
                x: 0, opacity: 1, duration: dur(0.7), ease: 'expo.out',
              }, dur(2.6 + i * Math.min(0.08, 1.5 / texts.length) * PACE_MULT));
            });
          }
        }

        // ===== CAPTION : mots arrivent alternés + color cycle =====
        const wordEls = capEl.querySelectorAll('.word');
        if (wordEls.length > 0) {
          tl.set(wordEls, { opacity: 0 }, 0);
          Array.from(wordEls).forEach((w, i) => {
            const fromX = i % 2 === 0 ? -amp(140) : amp(140);
            tl.fromTo(w, { x: fromX, opacity: 0 }, {
              x: 0, opacity: 1, duration: dur(0.65), ease: 'expo.out',
            }, dur(4.0 + i * 0.12 * PACE_MULT));
          });
          // Color cycle séquentiel (pas yoyo — seek-safe)
          tl.to(wordEls, { color: ACCENT, duration: dur(0.8), ease: 'sine.inOut', stagger: 0.08 * PACE_MULT }, dur(5.2));
          tl.to(wordEls, { color: '#ffffff', duration: dur(0.8), ease: 'sine.inOut', stagger: 0.08 * PACE_MULT }, dur(6.3));
          tl.to(wordEls, { color: ACCENT, duration: dur(0.8), ease: 'sine.inOut', stagger: 0.08 * PACE_MULT }, dur(7.4));
          tl.to(wordEls, { color: '#ffffff', duration: dur(0.8), ease: 'sine.inOut', stagger: 0.08 * PACE_MULT }, dur(8.5));
          tl.to(wordEls, { y: -amp(7), opacity: 0.9, duration: dur(0.6), ease: EASE_OUT }, dur(9.3));
        }

        window.__timelines = window.__timelines || {};
        window.__timelines['design-reveal-square'] = tl;
      })();
    </script>
  </body>
</html>
