<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1920px;
        background: #0a0a0a; overflow: hidden;
        font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Helvetica, "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      [data-composition-id="design-reveal-portrait"] {
        position: relative;
        width: 1080px; height: 1920px;
        background: #0a0a0a;
        overflow: hidden;
      }

      .stage {
        position: absolute;
        inset: 0;
        display: flex; align-items: center; justify-content: center;
        transform-origin: 50% 50%;
        will-change: transform, opacity;
      }
      .svg-host {
        width: 100%; height: 100%;
        display: flex; align-items: center; justify-content: center;
      }
      .svg-host > svg {
        width: 100%; height: 100%;
        filter: drop-shadow(0 30px 60px rgba(0,0,0,0.5));
      }

      .caption {
        position: absolute;
        left: 80px; right: 80px; bottom: 100px;
        color: #fff;
        font-size: 88px; font-weight: 900;
        letter-spacing: -0.03em; line-height: 0.98;
        text-shadow: 0 10px 28px rgba(0,0,0,0.9);
        z-index: 10;
      }
      .caption[hidden] { display: none; }
      .caption .word { display: inline-block; padding-right: 0.22em; will-change: transform, opacity; }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="design-reveal-portrait"
      data-start="0"
      data-duration="10"
      data-width="1080"
      data-height="1920"
      data-composition-variables='[
        {"id":"svg","type":"string","label":"SVG inline","default":""},
        {"id":"caption","type":"string","label":"Caption","default":""},
        {"id":"prompt","type":"string","label":"Prompt de formatage","default":""},
        {"id":"styleConfig","type":"object","label":"Style config (pace/intensity/ease/palette)","default":null}
      ]'
    >
      <div class="stage" id="stage">
        <div class="svg-host" id="svg-host"></div>
      </div>

      <div class="caption" id="caption" hidden></div>
    </div>

    <script>
      (function () {
        const hf = window.__hyperframes;
        const vars = (hf && typeof hf.getVariables === 'function' ? hf.getVariables() : {}) || {};

        const sc = vars.styleConfig || {};
        const palette = sc.palette || {};
        const BG = palette.bg || '#0a0a0a';
        const ACCENT = palette.accent || '#ffffff';
        const PACE_MULT = { slow: 1.3, normal: 1.0, fast: 0.7 }[sc.pace] ?? 1.0;
        const INT_SCALE = { subtle: 0.5, normal: 1.0, punchy: 1.8 }[sc.intensity] ?? 1.0;
        const EASE_IN   = { soft: 'power2.out', classic: 'expo.out',  snappy: 'back.out(1.4)' }[sc.ease] ?? 'expo.out';
        const EASE_OUT  = { soft: 'power2.inOut', classic: 'power2.in', snappy: 'back.in(1.2)' }[sc.ease] ?? 'power2.in';
        const dur = (d) => d * PACE_MULT;
        const amp = (v) => v * INT_SCALE;

        document.body.style.background = BG;
        const compEl = document.querySelector('[data-composition-id="design-reveal-portrait"]');
        if (compEl) compEl.style.background = BG;

        const host = document.getElementById('svg-host');
        if (vars.svg) host.innerHTML = String(vars.svg);

        const capEl = document.getElementById('caption');
        if (vars.caption) {
          const words = String(vars.caption).split(/\s+/).filter(Boolean);
          capEl.innerHTML = words.map(w => '<span class="word">' + w + '</span>').join('');
          capEl.style.color = ACCENT;
          capEl.hidden = false;
        }

        const svgEl = host.querySelector('svg');
        const shapes = svgEl ? Array.from(svgEl.querySelectorAll('path, rect, circle, polygon, polyline, ellipse, line')) : [];
        const images = svgEl ? Array.from(svgEl.querySelectorAll('image')) : [];
        const texts  = svgEl ? Array.from(svgEl.querySelectorAll('text'))  : [];

        const RASTER_ONLY = shapes.length === 0 && texts.length === 0 && images.length >= 1 && images.length <= 2;

        const tl = gsap.timeline({ paused: true });

        const startScale = 1 - amp(0.10);
        const endScale   = 1 + amp(0.10);
        tl.from('#stage', { scale: startScale, opacity: 0, duration: dur(0.9), ease: EASE_IN }, 0);
        tl.to('#stage', { scale: endScale, duration: dur(8.5), ease: 'sine.inOut' }, dur(1.0));

        if (RASTER_ONLY) {
          tl.set(images, { opacity: 0, transformOrigin: '50% 50%' }, 0);
          tl.to(images, { opacity: 1, duration: dur(0.9), ease: EASE_IN }, dur(0.2));
          tl.fromTo(images, {
            x: -amp(40), y: amp(20), scale: 1.0,
          }, {
            x: amp(40), y: -amp(20), scale: 1 + amp(0.15),
            duration: dur(8.5), ease: 'sine.inOut',
          }, dur(0.6));
        } else {
          const allSvgEls = [...shapes, ...images, ...texts];
          if (allSvgEls.length > 0) tl.set(allSvgEls, { opacity: 0 }, 0);

          if (shapes.length > 0) {
            tl.to(shapes, {
              opacity: 1, duration: dur(0.5), ease: 'power2.out',
              stagger: Math.min(0.04, 1.2 / shapes.length) * PACE_MULT,
            }, dur(0.6));
          }
          if (images.length > 0) {
            tl.to(images, {
              opacity: 1, duration: dur(0.7), ease: EASE_IN,
              stagger: Math.min(0.12, 1.5 / images.length) * PACE_MULT,
            }, dur(1.8));
          }
          if (texts.length > 0) {
            tl.to(texts, {
              opacity: 1, duration: dur(0.6), ease: EASE_IN,
              stagger: Math.min(0.08, 1.5 / texts.length) * PACE_MULT,
            }, dur(3.0));
          }
        }

        const wordEls = capEl.querySelectorAll('.word');
        if (wordEls.length > 0) {
          tl.set(wordEls, { y: amp(50), opacity: 0 }, 0);
          tl.to(wordEls, {
            y: 0, opacity: 1,
            duration: dur(0.75), ease: EASE_IN,
            stagger: 0.07 * PACE_MULT,
          }, dur(4.5));
        }

        if (wordEls.length > 0) tl.to(wordEls, { y: -amp(6), opacity: 0.85, duration: dur(0.6), ease: EASE_OUT }, dur(9.3));

        window.__timelines = window.__timelines || {};
        window.__timelines['design-reveal-portrait'] = tl;
      })();
    </script>
  </body>
</html>
